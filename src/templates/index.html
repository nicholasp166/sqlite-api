<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Database List</title>
  </head>
  <body>
    <h1>List of databases:</h1>
    {% for db in databases %} {% if db != "No DBs found" %}
    <div><a href="/database/{{db}}">{{ db }}</a></div>
    {% else %}
    <div>{{ db }}</div>
    {% endif %} {% endfor %}
  </body>
</html>
